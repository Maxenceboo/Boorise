name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-production-build:
    name: Verify production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Summary
        run: |
          echo "Vercel deploys Boorise automatically from main."
          ls -R dist || true
