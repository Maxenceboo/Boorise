name: CD

on:
  push:
    branches: [ main ]   # se déclenche quand une PR est mergée sur main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy (only on main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Rebuild Front ----
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps (front)
        run: npm ci
        working-directory: frontend
      - name: Build (front)
        run: npm run build
        working-directory: frontend

      # ---- Rebuild Back ----
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Package (back)
        run: mvn -B -ntp clean package -DskipTests
        working-directory: backend

      # ---- Deploy steps (à adapter) ----
      - name: Summary
        run: |
          echo "🚀 Deploying Boorise from main"
          ls -R frontend/dist || true
          ls -R backend/target || true
