services:
  postgres:
    image: postgres:16-alpine
    container_name: boorise-postgres
    environment:
      POSTGRES_DB: boorise
      POSTGRES_USER: boorise
      POSTGRES_PASSWORD: boorise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boorise -d boorise"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
