<section id="cta" class="relative py-16 overflow-visible">
  <!-- decorative accent allowed to overflow horizontally -->
  <div
    id="cta-decor"
    class="absolute -right-[18%] top-0 w-96 h-96 rotate-6 opacity-12 pointer-events-none"
  ></div>

  <div
    id="cta-inner"
    class="relative container mx-auto px-4 rounded-xl p-8 flex flex-col md:flex-row items-center justify-between gap-4 overflow-visible"
  >
    <div id="cta-copy" class="text-left">
      <h3 id="cta-title" class="text-xl font-bold">Prêt à essayer Boorise ?</h3>
      <p id="cta-sub" class="mt-2 text-slate-700">
        Lancez un environnement de test en quelques minutes et découvrez comment Boorise simplifie
        vos opérations.
      </p>
    </div>

    <div id="cta-actions" class="w-full md:w-auto flex flex-col sm:flex-row items-center gap-3">
      <input
        pInputText
        id="cta-email"
        type="email"
        placeholder="Votre email"
        class="w-full sm:w-72"
        autocomplete="email"
      />
      <button
        pButton
        id="cta-button"
        type="button"
        label="Demander une démo"
        icon="pi pi-arrow-right"
        iconPos="right"
        class="btn btn--link"
      ><i class="pi pi-arrow-right" style="font-size: 2rem"></i></button>
    </div>
  </div>
</section>
