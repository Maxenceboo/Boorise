<section id="mockup" class="py-16 overflow-visible relative">
  <div id="mockup-inner" class="container mx-auto px-4 overflow-visible">
    <div id="mockup-wrap" class="flex items-center justify-center relative">
      <div
        id="mockup-diag"
        class="absolute left-1/2 -translate-x-1/2 top-6 w-[120%] h-[28rem] -skew-x-6 bg-gradient-to-r from-emerald-400/10 via-sky-500/10 to-indigo-500/10 blur-2xl pointer-events-none dark:from-emerald-500/20 dark:via-sky-500/20 dark:to-indigo-500/20"
      ></div>
      <div
        class="pointer-events-none absolute inset-auto left-1/2 top-1/3 h-40 w-40 -translate-x-1/2 rounded-full bg-emerald-400/20 blur-3xl dark:bg-emerald-400/30"
      ></div>

      <div
        id="mockup-frame"
        class="relative z-10 w-full max-w-4xl transform -rotate-3 rounded-[28px] p-6 shadow-2xl shadow-emerald-950/30 transition-all duration-500 hover:-translate-y-2 hover:rotate-0 hover:shadow-emerald-500/30 dark:bg-slate-900/80 dark:shadow-black/50 dark:hover:shadow-emerald-500/40"
      >
        <svg
          id="mockup-svg"
          viewBox="0 0 900 520"
          xmlns="http://www.w3.org/2000/svg"
          class="w-full rounded-2xl shadow-2xl"
          style="filter: drop-shadow(0 22px 44px rgba(2, 6, 23, 0.14))"
        >
          <defs>
            <linearGradient id="mockup-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0f172a" />
              <stop offset="100%" stop-color="#1e293b" />
            </linearGradient>
            <linearGradient id="mockup-screen-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.08" />
              <stop offset="50%" stop-color="#22c55e" stop-opacity="0.04" />
              <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08" />
            </linearGradient>
          </defs>
        
          <g id="mockup-widgets" transform="translate(60,68)">
            <rect
              id="mu-1"
              x="0"
              y="0"
              width="620"
              height="40"
              rx="6"
              fill="#0f172a"
              opacity="0.08"
            />
            <rect
              id="mu-2"
              x="0"
              y="62"
              width="420"
              height="28"
              rx="6"
              fill="#0f172a"
              opacity="0.08"
            />
            <rect
              id="mu-3"
              x="0"
              y="104"
              width="750"
              height="240"
              rx="6"
              fill="#0f172a"
              opacity="0.08"
            />
          </g>
        </svg>
        <div
          class="absolute pointer-events-none"
          style="left: 4.67%; top: 9%; width: 90.67%; height: 78%"
        >
          <div class="w-full h-full rounded-xl overflow-hidden shadow-inner">
            <img
              src="https://placehold.co/600x400/png?text=Mockup+Overlay&bg=ffffff"
              alt="mockup overlay"
              class="w-full h-full object-cover pointer-events-none"
              style="opacity: 0.50"
            />
          </div>
        </div>

        <div
          class="pointer-events-none absolute -left-12 top-10 hidden w-48 rotate-3 rounded-2xl bg-white/80 p-4 shadow-lg shadow-emerald-400/10 backdrop-blur md:block dark:bg-slate-900/80 dark:text-slate-100 dark:shadow-emerald-500/20"
        >
          <p class="text-xs font-medium uppercase tracking-wide text-emerald-500 dark:text-emerald-300">Live KPI</p>
          <p class="mt-2 text-lg font-semibold text-slate-900 dark:text-slate-100">+18% croissance</p>
          <p class="text-xs text-slate-500 dark:text-slate-300/80">Ce mois-ci vs N-1</p>
        </div>

        <div
          class="pointer-events-none absolute -right-10 bottom-6 hidden w-48 -rotate-6 rounded-2xl bg-white/85 p-4 shadow-lg shadow-indigo-400/10 backdrop-blur md:block dark:bg-slate-900/80 dark:text-slate-100 dark:shadow-indigo-500/20"
        >
          <p class="text-xs font-medium uppercase tracking-wide text-indigo-500 dark:text-indigo-300">Alertes</p>
          <p class="mt-2 flex items-center gap-2 text-sm text-slate-700 dark:text-slate-200">
            <span class="inline-flex h-2.5 w-2.5 rounded-full bg-amber-400"></span>
            Stock faible : Référence A23
          </p>
          <p class="mt-1 flex items-center gap-2 text-sm text-slate-700 dark:text-slate-200">
            <span class="inline-flex h-2.5 w-2.5 rounded-full bg-emerald-400"></span>
            Facture réglée : INV-348
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
